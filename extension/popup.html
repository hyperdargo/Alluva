<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg-dark: #09090e;
      --bg-card: rgba(255, 255, 255, 0.03);
      --border-color: rgba(255, 255, 255, 0.08);
      --accent: #10b981;
      --accent-hover: #059669;
      --accent-blue: #0284c7;
      --accent-blue-hover: #0369a1;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: var(--font-family);
      font-size: 14px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 8px;
    }

    .title {
      font-size: 16px;
      font-weight: 700;
      margin: 0;
      background: linear-gradient(135deg, #10b981, #0284c7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .settings-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .settings-btn:hover {
      color: var(--text-main);
      background-color: rgba(255, 255, 255, 0.05);
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
    }

    .stream-status {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--text-muted);
    }

    .status-dot.active {
      background-color: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    .stream-title {
      font-weight: 600;
      font-size: 14px;
      margin: 0 0 6px 0;
      word-break: break-all;
    }

    .stream-url {
      font-family: monospace;
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin: 0 0 12px 0;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
    }

    .btn-primary {
      background-color: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background-color: var(--accent-hover);
    }

    .btn-blue {
      background-color: var(--accent-blue);
      color: #fff;
    }

    .btn-blue:hover {
      background-color: var(--accent-blue-hover);
    }

    .btn-secondary {
      background-color: rgba(255, 255, 255, 0.05);
      color: var(--text-main);
      border: 1px solid var(--border-color);
    }

    .btn-secondary:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }

    .no-stream {
      text-align: center;
      padding: 24px 8px;
      color: var(--text-muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 class="title">Stream Vault Companion</h1>
    <button class="settings-btn" id="settingsBtn" title="Extension Settings">⚙️</button>
  </div>

  <div id="activeStreamContent">
    <!-- Active stream contents populated by JS -->
  </div>

  <script src="popup.js"></script>
</body>
</html>
